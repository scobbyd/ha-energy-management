# Energy Package - EMS Helpers
# All input_number, input_select, input_datetime, and timer entities
# for the Energy Management System state machine and Soft Fuse.

# NOTE: input_number/input_boolean/input_select values without `initial:` are
# restored from storage on restart. Setting `initial:` forces the value every
# time HA starts — overriding user tuning. Keep these defaults documented in
# comments instead.

input_boolean:
  ems_sell_enabled:
    name: "EMS Sell Enabled"
    icon: mdi:trending-up

  ems_grid_use_enabled:
    name: "EMS Grid Use Enabled"
    icon: mdi:transmission-tower-import

  ems_dump_enabled:
    name: "EMS Dump Enabled"
    icon: mdi:fire

  ems_enabled:
    name: "EMS Enabled"
    icon: mdi:power

input_select:
  ems_state:
    name: "EMS State"
    icon: mdi:state-machine
    options:
      - "SELL"
      - "NORMAL"
      - "SELF_CONSUME"
      - "GRID_USE"
      - "DUMP"

  gen_port_mode:
    name: "GEN Port Mode"
    icon: mdi:power-plug
    options:
      - "Generator"
      - "Microinverter"
      - "SmartLoad"

input_number:
  # Price & Fee (default: 20 EUR/MWh)
  provider_fee:
    name: "Provider Fee"
    icon: mdi:currency-eur
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "EUR/MWh"

  # default: 7 ct/kWh
  dumpload_profit_threshold:
    name: "Dumpload Profit Threshold"
    icon: mdi:fire
    min: 0
    max: 30
    step: 0.5
    unit_of_measurement: "ct/kWh"

  # Inverter Control (default: 70%)
  dump_soc_entry:
    name: "DUMP SOC Entry"
    icon: mdi:battery-70
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"

  # default: 60%
  dump_soc_fallback:
    name: "DUMP SOC Fallback"
    icon: mdi:battery-alert
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"

  # Transition Control (default: 2 ct)
  transition_hysteresis:
    name: "Transition Hysteresis"
    icon: mdi:swap-horizontal
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: "ct"

  # default: 4 ct
  transition_fast_spread:
    name: "Transition Fast Spread"
    icon: mdi:speedometer
    min: 1
    max: 20
    step: 0.5
    unit_of_measurement: "ct"

  # default: 15 ct
  transition_instant_spread:
    name: "Transition Instant Spread"
    icon: mdi:flash
    min: 5
    max: 50
    step: 1
    unit_of_measurement: "ct"

  # SELL spike detection (default: 30 ct)
  sell_spike_spread:
    name: "SELL Spike Spread"
    icon: mdi:trending-up
    min: 5
    max: 100
    step: 1
    unit_of_measurement: "ct"

  # default: 40 ct
  sell_spike_floor:
    name: "SELL Spike Floor"
    icon: mdi:floor-plan
    min: 10
    max: 100
    step: 5
    unit_of_measurement: "ct"

  # default: 10 min
  transition_slow_duration:
    name: "Transition Slow Duration"
    icon: mdi:timer-sand
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "min"

  # default: 3 min
  transition_fast_duration:
    name: "Transition Fast Duration"
    icon: mdi:timer
    min: 0.5
    max: 10
    step: 0.5
    unit_of_measurement: "min"

input_datetime:
  # Soft Fuse hold tracking
  ems_soft_fuse_hold_until:
    name: "Soft Fuse Hold Until"
    has_date: true
    has_time: true

  # Soft Fuse zone tracking
  ems_soft_fuse_safe_since:
    name: "Soft Fuse Safe Since"
    has_date: true
    has_time: true

  ems_soft_fuse_warning_since:
    name: "Soft Fuse Warning Since"
    has_date: true
    has_time: true

timer:
  ems_slow:
    name: "EMS Slow Timer"
    icon: mdi:timer-sand

  ems_fast:
    name: "EMS Fast Timer"
    icon: mdi:timer
