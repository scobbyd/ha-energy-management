# Energy Package - GEN Port Mode Handler
# Syncs select.inverter_io_mode when gen_port_mode changes.
# Exits DUMP state if SmartLoad device is disconnected.

automation:
  - id: gen_port_mode_changed
    alias: "Energy - GEN Port - Mode Changed"
    description: "Sync IO mode when gen_port_mode changes; exit DUMP if leaving SmartLoad"
    trigger:
      - platform: state
        entity_id: input_select.gen_port_mode
    action:
      - choose:
          # Leaving SmartLoad while in DUMP → exit DUMP
          - conditions:
              - "{{ trigger.from_state.state == 'SmartLoad' and is_state('input_select.ems_state', 'DUMP') }}"
            sequence:
              - action: script.ems_apply_state
                data:
                  state: "GRID_USE"
              - action: system_log.write
                data:
                  message: "EMS: GEN port changed from SmartLoad while in DUMP → GRID_USE"
                  level: warning
                  logger: homeassistant.energy.ems
        # Otherwise, re-apply current state to update IO mode
        default:
          - action: script.ems_apply_state
            data:
              state: "{{ states('input_select.ems_state') }}"
